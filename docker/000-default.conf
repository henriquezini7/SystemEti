# O entrypoint substitui a porta deste VirtualHost por $PORT em runtime.
<VirtualHost *:8080>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Reforço: nunca servir código/app/dados pela web (já ficam fora do DocumentRoot).
    <DirectoryMatch "^/var/www/html/(app|storage|tools|docker)">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
